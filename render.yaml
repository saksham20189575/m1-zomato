services:
  - type: web
    name: milestone1-api
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn milestone1.phase6_api.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # Memory tunables for the 512 MB free tier — see docs/deployment.md §1.5.
      - key: PREWARM
        value: "0"
      - key: LOAD_LIMIT
        value: "3000"
