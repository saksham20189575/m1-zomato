# Railway service config — see https://docs.railway.com/reference/config-as-code
#
# Build is driven by Nixpacks. Phase overrides live in `nixpacks.toml` at the
# repo root (see the comment block there for why a src-layout project needs
# them). Nixpacks installs the project into the venv at /opt/venv, so the
# start command points at uvicorn there directly — no PATH magic required.
#
# Secrets and tunables (GROQ_API_KEY, GROQ_MODEL, HF_TOKEN, CORS_ORIGINS,
# optionally PREWARM and LOAD_LIMIT) live in the Railway dashboard under
# Variables — never committed here.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "/opt/venv/bin/uvicorn milestone1.phase6_api.app:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
